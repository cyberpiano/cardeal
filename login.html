<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteHomespace | Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --ivory: #faf9f6;
            --onyx: #1a1a1a;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--ivory);
            color: var(--onyx);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 2px 2px, #e5e7eb 1px, transparent 0);
            background-size: 40px 40px;
        }

        .serif { font-family: 'Playfair Display', serif; }
        
        .login-card {
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .admin-input {
            background: transparent;
            border-bottom: 1px solid #e2e8f0;
            padding: 0.75rem 0;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .admin-input:focus {
            border-color: var(--gold);
        }
    </style>
</head>
<body>

    <div class="w-full max-w-md px-8 py-12 login-card rounded-sm text-center">
        <div class="mb-10">
            <span class="text-2xl font-semibold tracking-[0.3em] uppercase serif italic">Elite<span class="text-[#d4af37] not-italic">Homespace</span></span>
            <div class="h-px w-12 bg-[#d4af37] mx-auto mt-4"></div>
        </div>

        <h2 class="serif text-3xl mb-4">Secure Portal</h2>
        <p class="text-[10px] uppercase tracking-widest text-stone-400 font-bold mb-10">Authorized Personnel Only</p>

        <form id="loginForm" class="space-y-8 text-left">
            <div class="flex flex-col">
                <label class="text-[9px] uppercase tracking-widest text-stone-400 mb-1">Email Address</label>
                <input id="email" type="email" class="admin-input text-sm" placeholder="concierge@elitehomespace.com" required>
            </div>
            <div class="flex flex-col">
                <label class="text-[9px] uppercase tracking-widest text-stone-400 mb-1">Access Key</label>
                <input id="password" type="password" class="admin-input text-sm" placeholder="••••••••" required>
            </div>

            <button type="submit" id="loginBtn" class="w-full bg-[#1a1a1a] text-white py-5 text-[10px] uppercase tracking-[0.4em] font-bold hover:bg-[#d4af37] transition-all mt-6 shadow-xl shadow-[#1a1a1a]/10">
                Authenticate Access
            </button>
        </form>

        <div class="mt-12">
            <a href="index.html" class="text-[9px] uppercase tracking-widest text-stone-400 hover:text-black transition-colors">
                <i class="fa-solid fa-arrow-left mr-2"></i> Return to Showroom
            </a>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCDx7qEq159vWdRRI2t4UK9dq5ESN9m0zw",
          authDomain: "realestate-7af59.firebaseapp.com",
          projectId: "realestate-7af59",
          storageBucket: "realestate-7af59.firebasestorage.app",
          messagingSenderId: "462067082872",
          appId: "1:462067082872:web:fb076c48e80240c327af8d",
          measurementId: "G-NZGFW35MEV"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.innerText = "VERIFYING CREDENTIALS...";

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'admin.html';
            } catch (error) {
                console.error("Login failed:", error);
                alert("Access Denied: " + error.message);
                btn.disabled = false;
                btn.innerText = "AUTHENTICATE ACCESS";
            }
        });
    </script>
</body>
</html>
